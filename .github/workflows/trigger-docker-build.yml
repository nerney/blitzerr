name: Trigger Docker build

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch to blitzerr-docker
        uses: actions/github-script@v7
        env:
          DISPATCH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'nerney',
              repo: 'blitzerr-docker',
              event_type: 'app-updated',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                token: process.env.DISPATCH_TOKEN
              }
            })
